version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      github-actions:
        patterns: ["*"]
    labels: [dependencies]
    open-pull-requests-limit: 5

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
    groups:
      development-dependencies:
        dependency-type: development
    labels: [dependencies, python]
    open-pull-requests-limit: 5
